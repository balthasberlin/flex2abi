<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbiFlex – Anmelden</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const meta = document.createElement('meta');
            meta.name = 'theme-color';
            meta.content = '#0b0c10';
            document.head.appendChild(meta);
        });
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-512.png">
    <link rel="icon" type="image/png" href="icons/icon-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --accent-primary: #8b5cf6;
            --accent-secondary: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.04);
            --danger: #ef4444;
            --success: #22c55e;
            --gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .bg-blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.15; animation: float 12s ease-in-out infinite; pointer-events: none; }
        .bg-blob-1 { width: 500px; height: 500px; background: var(--accent-primary); top: -150px; left: -150px; }
        .bg-blob-2 { width: 400px; height: 400px; background: var(--accent-secondary); bottom: -100px; right: -100px; animation-delay: -6s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.05); } }

        .login-card {
            background: var(--card-bg); -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 28px; padding: 2.5rem;
            width: 100%; max-width: 420px; margin: 1.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5); position: relative; z-index: 10;
            animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes cardIn { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); border-radius: 28px 28px 0 0; pointer-events: none; }

        .brand { text-align: center; margin-bottom: 2rem; }
        .brand-logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .brand-name { font-size: 1.6rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .brand-tagline { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.3rem; }

        .tab-bar { display: flex; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 4px; margin-bottom: 1.5rem; }
        .tab-btn { flex: 1; padding: 0.6rem; background: transparent; border: none; border-radius: 9px; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .tab-btn.active { background: var(--accent-primary); color: white; box-shadow: 0 4px 15px rgba(139,92,246,0.4); }

        .field { margin-bottom: 1.2rem; }
        .field label { display: block; font-size: 0.78rem; color: var(--text-muted); font-weight: 600; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .field input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 0.9rem 1rem; color: var(--text-main); font-size: 1rem; outline: none; transition: all 0.3s ease; }
        .field input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }

        .submit-btn { width: 100%; padding: 1rem; background: var(--gradient); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem; transition: all 0.2s ease; box-shadow: 0 8px 20px rgba(139,92,246,0.3); letter-spacing: 0.5px; }
        .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(139,92,246,0.45); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        #status-msg { margin-top: 1rem; padding: 0.7rem 1rem; border-radius: 10px; font-size: 0.85rem; text-align: center; display: none; }
        #status-msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; display: block; }
        #status-msg.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; display: block; }
        #status-msg.info { background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.3); color: #67e8f9; display: block; }

        .loader { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modern Switch Styling (aligned with index.html) */
        .remember-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0.5rem 0 1.5rem 0;
            padding: 0 0.2rem;
        }
        .remember-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        input:checked + .slider { background: var(--gradient); border-color: transparent; }
        input:checked + .slider:before { transform: translateX(18px); }
        .alpha-label-badge { font-size: 0.7rem; color: var(--accent-primary); font-weight: 400; margin-left: 0.4rem; }
    </style>
</head>
<body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="login-card">
        <div class="brand">
            <div class="brand-logo">🎓</div>
            <div class="brand-name">ABIFLEX</div>
            <div class="brand-tagline">Stimme aufnehmen · KI zusammenfassen · Abi bestehen</div>
        </div>

        <div class="tab-bar">
            <button type="button" class="tab-btn active" id="tab-login">Anmelden</button>
            <button type="button" class="tab-btn" id="tab-signup">Registrieren</button>
        </div>

        <form id="login-form" autocomplete="on">
            <div class="field">
                <label for="email-input">E-Mail</label>
                <input type="email" id="email-input" name="email" placeholder="name@beispiel.de" autocomplete="email" required>
            </div>
            <div class="field">
                <label for="password-input">Passwort</label>
                <input type="password" id="password-input" name="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <div class="field" id="alpha-field">
                <label for="alpha-input">Zugangscode
                    <span class="alpha-label-badge">Alpha</span>
                </label>
                <input type="password" id="alpha-input" name="alpha" placeholder="••••" autocomplete="off" inputmode="numeric">
            </div>
            
            <div class="remember-wrap" id="remember-group">
                <label class="remember-label" for="remember-toggle">Anmeldung merken</label>
                <label class="switch">
                    <input type="checkbox" id="remember-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Anmelden</button>
        </form>

        <div id="status-msg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js?v=2"></script>
    <script>
    (function() {
        'use strict';

        // --- State ---
        let sb = null;
        let mode = 'login'; // 'login' or 'signup'

        // --- DOM ---
        const form      = document.getElementById('login-form');
        const emailIn   = document.getElementById('email-input');
        const passIn    = document.getElementById('password-input');
        const submitBtn = document.getElementById('submit-btn');
        const statusEl  = document.getElementById('status-msg');
        const tabLogin  = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const rememberToggle = document.getElementById('remember-toggle');
        const rememberGroup  = document.getElementById('remember-group');
        const alphaField     = document.getElementById('alpha-field');
        const alphaIn        = document.getElementById('alpha-input');

        const STORAGE_KEY = 'abiflex_remembered_email';

        // --- Helpers ---
        function showStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = type; // 'error', 'success', 'info', or ''
        }

        function setLoading(on) {
            if (on) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loader"></span> Bitte warten...';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = mode === 'login' ? 'Anmelden' : 'Account erstellen';
            }
        }

        // --- Init Supabase ---
        (function waitForClient() {
            if (window.supabaseClient) {
                sb = window.supabaseClient;
            } else {
                setTimeout(waitForClient, 50);
            }
        })();

        // --- Alpha-Gate (SHA-256 Verifikation) ---
        // Das Alpha-Passwort steht hier NUR als Hash (nie im Klartext).
        // Um das Passwort zu ändern: neuen Hash mit folgendem PowerShell-Befehl erzeugen:
        // [System.BitConverter]::ToString([System.Security.Cryptography.SHA256]::Create().ComputeHash([System.Text.Encoding]::UTF8.GetBytes("NEUES_PASSWORT"))).Replace("-","").ToLower()
        // Oder im Browser-Konsole: hashAlpha('neues_passwort').then(console.log)
        const ALPHA_HASH = '712dca40936b39ce670dc803736fe3735cf99311030a928de039a36f77926230';
        
        async function hashAlpha(input) {
            const encoder = new TextEncoder();
            const data = encoder.encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function verifyAlphaCode(input) {
            if (!input) return false;
            const computed = await hashAlpha(input.trim());
            return computed === ALPHA_HASH;
        }

        // --- Background session check ---
        if (sb) {
            const t = setTimeout(function(){}, 2000); // safety
            sb.auth.getSession().then(function(res) {
                clearTimeout(t);
                if (res.data && res.data.session) {
                    window.location.href = 'index.html';
                }
            }).catch(function() { clearTimeout(t); });
        }

        // Load remembered email & handle URL parameters (Errors/Confirmations)
        (function initFromUrl() {
            // 1. Remembered Email
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                emailIn.value = saved;
                rememberToggle.checked = true;
            }

            // 2. Handle URL parameters (Errors or Success)
            const params = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            
            // Check for Errors from Supabase (often in Hash)
            const error = hashParams.get('error') || params.get('error');
            const errorDesc = hashParams.get('error_description') || params.get('error_description');
            
            if (error) {
                showStatus(`Fehler: ${errorDesc || error}`, 'error');
            } else if (params.get('confirmed') === 'true') {
                showStatus('✓ E-Mail erfolgreich bestätigt! Du kannst dich jetzt einloggen.', 'success');
            }
        })();

        // --- Tab switching ---
        tabLogin.addEventListener('click', function() {
            mode = 'login';
            tabLogin.classList.add('active');
            tabSignup.classList.remove('active');
            submitBtn.textContent = 'Anmelden';
            passIn.autocomplete = 'current-password';
            if (rememberGroup) rememberGroup.style.display = 'flex';
            if (alphaField) alphaField.style.display = 'block'; // Alpha-Code nur beim Login
            showStatus('', '');
        });

        tabSignup.addEventListener('click', function() {
            mode = 'signup';
            tabSignup.classList.add('active');
            tabLogin.classList.remove('active');
            submitBtn.textContent = 'Account erstellen';
            passIn.autocomplete = 'new-password';
            if (rememberGroup) rememberGroup.style.display = 'none';
            if (alphaField) alphaField.style.display = 'none'; // Beim Signup kein Alpha-Code
            showStatus('', '');
        });

        // --- Form submit ---
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            var email    = emailIn.value.trim();
            var password = passIn.value;
            var alpha    = alphaIn ? alphaIn.value : '';

            if (!email || !password) {
                showStatus('Bitte E-Mail und Passwort eingeben.', 'error');
                return;
            }
            if (!sb) {
                showStatus('Verbindung zum Server fehlgeschlagen. Bitte Seite neu laden.', 'error');
                return;
            }

            // Alpha-Gate: Nur beim Login prüfen
            if (mode === 'login') {
                verifyAlphaCode(alpha).then(function(valid) {
                    if (!valid) {
                        showStatus('Falscher Zugangscode. Bitte Alpha-Code eingeben.', 'error');
                        if (alphaIn) alphaIn.focus();
                        return;
                    }
                    runAuth(email, password);
                });
            } else {
                runAuth(email, password);
            }
        });

        function runAuth(email, password) {
            setLoading(true);
            showStatus('', '');

            // Dynamically determine redirect URL (works for local dev & production)
            var baseUrl = window.location.href.split('?')[0].split('#')[0];
            if (baseUrl.endsWith('/')) baseUrl += 'index.html';
            
            // If the user lands on login.html after clicking the email link, we want to show a success msg
            var signupRedirect = baseUrl.includes('login.html') 
                ? baseUrl + '?confirmed=true' 
                : baseUrl.replace('index.html', 'login.html') + '?confirmed=true';

            var authPromise = mode === 'login'
                ? sb.auth.signInWithPassword({ email: email, password: password })
                : sb.auth.signUp({ 
                    email: email, 
                    password: password,
                    options: {
                        emailRedirectTo: signupRedirect
                    }
                });

            var timeout = new Promise(function(_, reject) {
                setTimeout(function() { reject(new Error('Zeitüberschreitung – Server nicht erreichbar.')); }, 8000);
            });

            Promise.race([authPromise, timeout])
                .then(function(result) {
                    if (result.error) {
                        showStatus('Fehler: ' + result.error.message, 'error');
                    } else if (mode === 'signup') {
                        showStatus('✓ Bestätigungs-E-Mail gesendet! Bitte Postfach prüfen.', 'success');
                    } else {
                        // Handle "Remember Me"
                        if (rememberToggle.checked) {
                            localStorage.setItem(STORAGE_KEY, email);
                        } else {
                            localStorage.removeItem(STORAGE_KEY);
                        }
                        showStatus('✓ Erfolgreich! Weiterleitung...', 'success');
                        setTimeout(function() { window.location.href = 'index.html'; }, 800);
                    }
                })
                .catch(function(err) {
                    showStatus('Fehler: ' + err.message, 'error');
                })
                .finally(function() {
                    setLoading(false);
                });
        }
    })();
    </script>
</body>
</html>
