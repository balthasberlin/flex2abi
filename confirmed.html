<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestätigung erfolgreich – AbiFlex</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const meta = document.createElement('meta');
            meta.name = 'theme-color';
            meta.content = '#0b0c10';
            document.head.appendChild(meta);
        });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --accent-primary: #8b5cf6;
            --accent-secondary: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.04);
            --success: #22c55e;
            --gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .bg-blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.15; animation: float 12s ease-in-out infinite; pointer-events: none; }
        .bg-blob-1 { width: 500px; height: 500px; background: var(--accent-primary); top: -150px; left: -150px; }
        .bg-blob-2 { width: 400px; height: 400px; background: var(--accent-secondary); bottom: -100px; right: -100px; animation-delay: -6s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.05); } }

        .confirm-card {
            background: var(--card-bg); -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 28px; padding: 3rem 2rem;
            width: 100%; max-width: 420px; margin: 1.5rem; text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5); position: relative; z-index: 10;
            animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes cardIn { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .success-icon {
            font-size: 4rem; margin-bottom: 1.5rem; display: inline-block;
            animation: checkPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.3s; opacity: 0;
        }
        @keyframes checkPop { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.3; }
        p { color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem; }

        .login-btn {
            display: inline-block; width: 100%; padding: 1rem;
            background: var(--gradient); border: none; border-radius: 12px;
            color: white; font-size: 1rem; font-weight: 700; text-decoration: none;
            transition: all 0.2s ease; box-shadow: 0 8px 20px rgba(139,92,246,0.3);
            letter-spacing: 0.5px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(139,92,246,0.45); }

        .redirect-text { font-size: 0.8rem; color: var(--text-muted); margin-top: 1.5rem; opacity: 0.7; }
        #countdown { color: var(--accent-secondary); font-weight: 800; }
    </style>
</head>
<body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="confirm-card">
        <div class="success-icon">✅</div>
        <h1>E-Mail Adresse bestätigt!</h1>
        <p>Vielen Dank. Dein Account bei AbiFlex ist jetzt aktiv und bereit für deine erste Aufnahme.</p>
        
        <a href="login.html" class="login-btn">Jetzt Anmelden</a>

        <div class="redirect-text">
            Weiterleitung in <span id="countdown">5</span> Sekunden...
        </div>
    </div>

    <script>
        let timeLeft = 5;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = 'login.html';
            }
        }, 1000);
    </script>
</body>
</html>
